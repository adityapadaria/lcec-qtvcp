#----------------------------------------------------------------------- [EMC] general information 

[EMC]
VERSION = 1.1
MACHINE = bharat_cnc_metric
DEBUG = 0x00000000

#----------------------------------------------------------------------- [DISPLAY] settings related to the graphical user interface 

[DISPLAY]

DISPLAY = qtvcp software

TITLE = Bharat CNC
ICON = ./software/resources/icon-white.png

INTRO_GRAPHIC = ./software/resources/boot-geometry.png
INTRO_TIME = 1

# PROGRAM_PREFIX = /home/cnc/linuxcnc/configs/lcec-qtvcp/gcode/Geometry/square.ngc

# NGCGUI subroutine path.
# Thr path must also  be in [RS274NGC] SUBROUTINE_PATH
NGCGUI_SUBFILE_PATH = ../../../nc_files/ngcgui_lib/
# pre selected programs tabs
# specify filenames only, files must be in the NGCGUI_SUBFILE_PATH
NGCGUI_SUBFILE = slot.ngc
NGCGUI_SUBFILE = qpocket.ngc

MDI_HISTORY_FILE = mdi_history.dat
LOG_FILE = debug.log

# qtvcp saves most preference to this file
PREFERENCE_FILE_PATH = WORKINGFOLDER/software/software.pref

POSITION_OFFSET = RELATIVE      
POSITION_FEEDBACK = ACTUAL    
# DRO_FORMAT_MM = %+08.6f        
# DRO_FORMAT_IN = % 4.1f          
# CONE_BASESIZE = .25            

MAX_FEED_OVERRIDE = 1.5  

MIN_SPINDLE_OVERRIDE = 0.5  
MAX_SPINDLE_OVERRIDE = 1.0    
DEFAULT_SPINDLE_SPEED = 1800

MIN_LINEAR_VELOCITY     = 0
MAX_LINEAR_VELOCITY     = 60.00
DEFAULT_LINEAR_VELOCITY = 50.0

CYCLE_TIME = 0.100             

DEFAULT_LINEAR_VELOCITY = 100.00
MIN_LINEAR_VELOCITY = 0
MAX_LINEAR_VELOCITY = 100.00

DEFAULT_ANGULAR_VELOCITY = .25
MIN_ANGULAR_VELOCITY = .01
MAX_ANGULAR_VELOCITY = 1.0

DEFAULT_SPINDLE_0_SPEED   = 8000
MAX_SPINDLE_0_SPEED       = 24000
MIN_SPINDLE_0_SPEED       = 7200
MIN_SPINDLE_0_OVERRIDE    = 0.5
MAX_SPINDLE_0_OVERRIDE    = 1.2

INCREMENTS = 1mm .1mm .01mm .001mm
GRIDS = 10mm 20mm 50mm 100mm

# GEOMETRY = XYZ
ARCDIVISION = 64

# optional user dialogs (3), controlled by HAL pins
MESSAGE_BOLDTEXT = Critical and Persistent
MESSAGE_TEXT = This is a persistent dialog test
MESSAGE_DETAILS = There seems to be something wrong\n You must fix it to clear message
MESSAGE_TYPE = nonedialog
MESSAGE_PINNAME = nonedialogtest
MESSAGE_ICON = CRITICAL

MESSAGE_BOLDTEXT = Do You Want To Make A Choice?
MESSAGE_TEXT = This is a yes no dialog test
MESSAGE_DETAILS = Y/N DETAILS
MESSAGE_TYPE = yesnodialog
MESSAGE_PINNAME = yndialogtest
MESSAGE_ICON = QUESTION

MESSAGE_BOLDTEXT = This is an information message
MESSAGE_TEXT = This is low priority
MESSAGE_DETAILS = press ok to clear
MESSAGE_TYPE = okdialog status
MESSAGE_PINNAME = bothtest
MESSAGE_ICON = INFO

# optional tab showing an external qtvcp panel
EMBED_TAB_NAME=Vismach demo
EMBED_TAB_COMMAND=qtvcp vismach_mill_xyz
EMBED_TAB_LOCATION=tabWidget_utilities

#----------------------------------------------------------------------- [FILTER] settings input filter programs 

[FILTER]

PROGRAM_EXTENSION = .ngc,.nc,.tap G-Code File (*.ngc,*.nc,*.tap)
# PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
# PROGRAM_EXTENSION = .py Python Script

# specifies what special 'filter' programs runs based on program ending
# png = image-to-gcode
# gif = image-to-gcode
# jpg = image-to-gcode
# py = python3

#----------------------------------------------------------------------- [KINS] kinematics variables 

[KINS]

JOINTS = 3
KINEMATICS = trivkins coordinates=XYZ

#----------------------------------------------------------------------- [RS274NGC] settings used by the G-code interpreter 

[RS274NGC]

PARAMETER_FILE = parameters.var
# RS274NGC_STARTUP_CODE = G17 G21 G40 G43H0 G54 G64P0.0127 G80 G90 G94 G97 M5 M9
# SUBROUTINE_PATH = ../../../../nc_files/probe/basic_probe/macros:~/linuxcnc/nc_files/examples/ngcgui_lib:~/linuxcnc/nc_files/examples/ngcgui_lib/utilitysubs

# CENTER_ARC_RADIUS_TOLERANCE_MM = 

INI_VARS = 0
HAL_PIN_VARS = 0

# RETAIN_G43 = 
# DISABLE_G92_PERSISTENCE = 
# DISABLE_FANUC_STYLE_SUB = 

# LOG_LEVEL =
# LOG_FILE = 

# on abort, this ngc file is called. required for basic/versa probe
# ON_ABORT_COMMAND=O <on_abort> call

#----------------------------------------------------------------------- [EMCMOT] settings used by the real time motion controller 

[EMCMOT]

EMCMOT = motmod
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000
# TRAJ_PERIOD = 

COMM_TIMEOUT = 1.0
COMM_WAIT = 0.010

# HOMEMOD = 

#----------------------------------------------------------------------- [TASK] settings used by the task controller 

[TASK]

TASK = milltask
CYCLE_TIME = 0.010

#----------------------------------------------------------------------- [TRAJ] additional settings used by the real time motion controller 

[TRAJ]

# ARC_BLEND_ENABLE = 1
# ARC_BLEND_FALLBACK_ENABLE = 0
# ARC_BLEND_OPTIMIZATION_DEPTH = 50
# ARC_BLEND_GAP_CYCLES = 4
# ARC_BLEND_RAMP_FREQ = 100

SPINDLES = 1 
COORDINATES =  X Y Z

LINEAR_UNITS = mm
ANGULAR_UNITS = degree

DEFAULT_LINEAR_VELOCITY = 100.0
DEFAULT_LINEAR_ACCELERATION = 50.0 
MAX_LINEAR_VELOCITY = 100.00
MAX_LINEAR_ACCELERATION = 50.0

